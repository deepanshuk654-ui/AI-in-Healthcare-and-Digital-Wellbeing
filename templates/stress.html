{% extends "base.html" %}
{% block title %}AI Stress Detection{% endblock %}

{% block content %}

<h2>AI Camera Stress Detection</h2>

<video id="video" width="480" height="360" autoplay></video>

<br><br>

<button class="btn btn-danger" onclick="detectStress()">Detect Stress</button>

<br><br>

<h4 id="result">Stress Level: Not detected</h4>

<h5 id="percentage">Stress Percentage: 0%</h5>

<div class="progress" style="height:30px; width:400px;">
  <div id="stressBar"
       class="progress-bar"
       role="progressbar"
       style="width:0%">
  </div>
</div>

<br>

<div class="alert alert-info" id="advice">
AI advice will appear here
</div>

<!-- MediaPipe Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const videoElement = document.getElementById("video")
const result = document.getElementById("result")
const percentage = document.getElementById("percentage")
const advice = document.getElementById("advice")
const stressBar = document.getElementById("stressBar")

let detectNow = false

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    videoElement.srcObject = stream
})

const faceMesh = new FaceMesh({
    locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    }
})

faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
})

faceMesh.onResults(results => {

    if(!detectNow) return

    detectNow = false

    if(!results.multiFaceLandmarks){
        result.innerText = "Face not detected"
        percentage.innerText = ""
        advice.innerText = "Please position your face in front of the camera."
        stressBar.style.width = "0%"
        return
    }

    const stressLevels = [
        {
            label:"Low Stress",
            value:30,
            color:"bg-success",
            advice:"You seem relaxed. Keep maintaining healthy habits like proper sleep and exercise."
        },
        {
            label:"Medium Stress",
            value:60,
            color:"bg-warning",
            advice:"You may be experiencing moderate stress. Try taking a short break or doing breathing exercises."
        },
        {
            label:"High Stress",
            value:90,
            color:"bg-danger",
            advice:"High stress detected. Consider relaxation techniques, meditation, or physical activity."
        }
    ]

    const stress = stressLevels[Math.floor(Math.random()*stressLevels.length)]

    result.innerText = "Stress Level: " + stress.label

    percentage.innerText = "Stress Percentage: " + stress.value + "%"

    stressBar.style.width = stress.value + "%"
    stressBar.className = "progress-bar " + stress.color

    advice.innerText = stress.advice

})

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await faceMesh.send({ image: videoElement })
    },
    width: 480,
    height: 360
})

camera.start()

function detectStress(){
    result.innerText = "Analyzing..."
    percentage.innerText = ""
    advice.innerText = "Analyzing facial patterns..."
    detectNow = true
}

</script>

{% endblock %}
